services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: exchange_rate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exchange_rate"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      EXCHANGE_DATABASE_DSN: postgres://postgres:postgres@postgres:5432/exchange_rate?sslmode=disable
      EXCHANGE_GRPC_PORT: 50051
    ports:
      - "50051:50051"
